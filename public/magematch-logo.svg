<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2410C;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon Mark: Stylized M + Connection nodes -->
  <g transform="translate(8, 10)">
    <!-- Hexagon background -->
    <polygon points="30,2 52,14 52,38 30,50 8,38 8,14" 
             fill="url(#iconGrad)" opacity="0.12" stroke="#F97316" stroke-width="1.5"/>
    
    <!-- M shape constructed from geometric lines -->
    <g filter="url(#glow)">
      <!-- Left vertical -->
      <line x1="16" y1="34" x2="16" y2="16" stroke="url(#mGrad)" stroke-width="3" stroke-linecap="round"/>
      <!-- Left diagonal down -->
      <line x1="16" y1="16" x2="30" y2="28" stroke="url(#mGrad)" stroke-width="3" stroke-linecap="round"/>
      <!-- Right diagonal up -->
      <line x1="30" y1="28" x2="44" y2="16" stroke="url(#mGrad)" stroke-width="3" stroke-linecap="round"/>
      <!-- Right vertical -->
      <line x1="44" y1="16" x2="44" y2="34" stroke="url(#mGrad)" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Connection dots — representing "matching" -->
    <circle cx="16" cy="34" r="3.5" fill="#F97316"/>
    <circle cx="30" cy="28" r="3.5" fill="#F97316" opacity="0.7"/>
    <circle cx="44" cy="34" r="3.5" fill="#F97316"/>

    <!-- Small connector line below (match symbol) -->
    <line x1="20" y1="40" x2="40" y2="40" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="20" cy="40" r="2" fill="#F97316" opacity="0.6"/>
    <circle cx="40" cy="40" r="2" fill="#F97316" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(72, 0)">
    <!-- MAGE -->
    <text x="0" y="50" 
          font-family="Georgia, 'Times New Roman', serif" 
          font-size="38" 
          font-weight="700"
          letter-spacing="-1"
          fill="#111827">Mage</text>
    <!-- MATCH in orange -->
    <text x="92" y="50" 
          font-family="Georgia, 'Times New Roman', serif" 
          font-size="38" 
          font-weight="700"
          letter-spacing="-1"
          fill="#F97316">Match</text>
    <!-- Tagline -->
    <text x="1" y="66" 
          font-family="'Courier New', monospace" 
          font-size="9" 
          font-variant="small-caps"
          letter-spacing="3"
          fill="#9CA3AF">MAGENTO DEVELOPER MARKETPLACE</text>
  </g>
</svg>
